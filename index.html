<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Court File Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Court File Tracker</h1>
  </header>

  <nav>
    <button onclick="navigate('dashboard')">Dashboard</button>
    <button onclick="navigate('newFile')">New File Entry</button>
    <button onclick="navigate('return')">Return File</button>
    <button onclick="navigate('search')">Search</button>
    <button onclick="navigate('settings')">Settings</button>
  </nav>

  <main>
    <section id="dashboard" class="screen active">
      <h2>Welcome to Court File Tracker</h2>
      <p>Today's summary will appear here.</p>
    </section>

    <section id="newFile" class="screen">
      <h2>New File Entry & Delivery</h2>
      <form id="fileForm">
        <label>Case Type:
          <select id="caseType" required onchange="toggleCriminalFields()">
            <option value="">Select</option>
            <option value="civil">Civil</option>
            <option value="criminal">Criminal</option>
          </select>
        </label><br />

        <label>CMS No:<input type="number" id="cmsNo" required /></label><br />

        <label>Petitioner:<input type="text" id="petitioner" required /></label><br />
        <label>Respondent:<input type="text" id="respondent" required /></label><br />

        <label>Nature:<input type="text" id="nature" required /></label><br />

        <div id="criminalFields" style="display:none">
          <label>FIR No:<input type="text" id="firNo" /></label><br />
          <label>FIR Year:<input type="number" id="firYear" min="1947" /></label><br />
          <label>FIR U/S:<input type="text" id="firUs" /></label><br />
          <label>Police Station:<input type="text" id="policeStation" /></label><br />
        </div>

        <label>Date Type:
          <select id="dateType" required>
            <option value="">Select</option>
            <option value="decision">Decision Date</option>
            <option value="hearing">Next Hearing Date</option>
          </select>
        </label><br />
        <label>Date:<input type="date" id="date" required /></label><br />

        <hr />

        <label>Delivered To (Name):<input type="text" id="deliveredTo" required /></label><br />
        <label>Delivered To Type:
          <select id="deliveredType" required>
            <option value="">Select</option>
            <option value="advocate">Advocate</option>
            <option value="munshi">Munshi</option>
            <option value="colleague">Colleague</option>
          </select>
        </label><br />

        <button type="submit">Save and Deliver File</button>
      </form>
    </section>

    <section id="return" class="screen">
      <h2>Return File</h2>
      <form id="returnForm">
        <label>CMS No:<input type="number" id="returnCms" required /></label><br />
        <button type="submit">Mark Returned</button>
      </form>
    </section>

    <section id="search" class="screen">
      <h2>Search</h2>
      <input type="text" id="searchBox" placeholder="Enter CMS or Title..." />
      <div id="searchResults" style="margin-top: 10px;"></div>
    </section>

    <section id="settings" class="screen">
      <h2>Settings</h2>
      <label>Clerk Name:<input type="text" id="clerkName" /></label><br />
      <label>Judge Name:<input type="text" id="judgeName" /></label><br />
      <button onclick="saveSettings()">Save</button>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js')
          .then(() => console.log("Service Worker registered"));
      });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log("PWA install prompt ready.");
    });
  </script>
</body>
</html>
